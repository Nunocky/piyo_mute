<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぴよ日記フィルタ</title>
    <style>
      body {
        font-family: sans-serif;
        width: 300px;
        padding: 12px;
        font-size: 14px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      .tabs {
        display: flex;
        border-bottom: 2px solid #ddd;
        margin-bottom: 12px;
      }
      .tab {
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        background: none;
        color: #666;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .tab.active {
        color: #000;
        border-bottom-color: #000;
        font-weight: bold;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      textarea {
        width: 100%;
        height: 100px;
        box-sizing: border-box;
        font-size: 13px;
        resize: vertical;
      }
      #save {
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 12px;
      }
      #status {
        color: green;
        margin-top: 8px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>ぴよ日記フィルタ</h1>

    <div class="tabs">
      <button class="tab active" data-tab="users">ユーザー</button>
      <button class="tab" data-tab="tags">タグ</button>
    </div>

    <div id="panel-users" class="tab-panel active">
      <p class="hint">1行に1ユーザー名</p>
      <textarea id="mutedUsers" placeholder="ユーザー名"></textarea>
    </div>

    <div id="panel-tags" class="tab-panel">
      <p class="hint">1行に1タグ名（# 不要）</p>
      <textarea id="mutedTags" placeholder="タグ名"></textarea>
    </div>

    <button id="save">保存</button>
    <p id="status"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
