<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぴよ日記ミュート</title>
    <style>
      body {
        font-family: sans-serif;
        width: 300px;
        padding: 12px;
        font-size: 14px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .toggle input {
        margin: 0;
      }
      textarea {
        width: 100%;
        height: 100px;
        box-sizing: border-box;
        font-size: 13px;
        resize: vertical;
      }
      #save {
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 12px;
      }
      .support {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e0e0e0;
        font-size: 11px;
        color: #666;
        line-height: 1.5;
      }
      .support p {
        margin: 0 0 8px;
      }
      .support-buttons {
        display: flex;
        gap: 8px;
      }
      .btn-donate {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        background-color: #ffdd00;
        color: #333;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-donate:hover {
        background-color: #e6c700;
      }
      .btn-review {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        background-color: #f5f5f5;
        color: #333;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-review:hover {
        background-color: #e8e8e8;
      }
    </style>
  </head>
  <body>
    <h1>ぴよ日記ミュート</h1>

    <label class="toggle" for="enabled">
      <input type="checkbox" id="enabled" checked />
      ミュート機能を有効にする
    </label>

    <p class="hint">1行に1タグ名（# 不要）</p>
    <textarea id="mutedTags" placeholder="タグ名"></textarea>

    <button id="save">保存</button>

    <div class="support">
      <p>
        ぴよ日記ミュートの開発継続と発展のため、コーヒー1杯分ご寄付いただけますと嬉しいです。
      </p>
      <div class="support-buttons">
        <a href="https://ko-fi.com/nunocky" target="_blank" class="btn-donate"
          >❤️ 寄付</a
        >
        <a
          href="https://chromewebstore.google.com/detail/%E3%81%B4%E3%82%88%E6%97%A5%E8%A8%98%E3%83%9F%E3%83%A5%E3%83%BC%E3%83%88/clhiolbikfdjafenkmondbeanpgfbbjk/reviews"
          target="_blank"
          class="btn-review"
          >レビューで応援</a
        >
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
