<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぴよ日記ミュート</title>
    <style>
      body {
        font-family: sans-serif;
        width: 300px;
        padding: 12px;
        font-size: 14px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-bottom: 4px;
      }
      textarea {
        width: 100%;
        height: 100px;
        box-sizing: border-box;
        font-size: 13px;
        resize: vertical;
      }
      #save {
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 12px;
      }
      #status {
        color: green;
        margin-top: 8px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>ぴよ日記ミュート</h1>

    <p class="hint">1行に1タグ名（# 不要）</p>
    <textarea id="mutedTags" placeholder="タグ名"></textarea>

    <button id="save">保存</button>
    <p id="status"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
